<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GadgetMart - Product Showcase</title>
  <link rel="stylesheet" href="css files/style.css">
</head>
<body>

  <header>
    <h1>GadgetMart</h1>

  <main>
    <h2>Featured Products</h2>

    <figure class="card">
      <img src="asssts/shopping.jpeg" alt="NovaTech Laptop X500">
      <figcaption>
        <p class="title">NovaTech Laptop X500</p>
        <p class="price">Rs. 55,999</p>

          <li>Intel Core i5 12th Gen</li>
          <li>8 GB RAM, 512 GB SSD</li>
          <li>15.6 inch FHD Display</li>
          <li>Windows 11 Home</li>
        </ul>

    <figure class="card">
      <img src="asssts/shopping-1.jpeg" alt="ZenPhone Pro 5G">
      <figcaption>
        <p class="title">ZenPhone Pro 5G</p>
        <p class="price">Rs. 28,499</p>
        <ul>
          <li>6.7 inch AMOLED Display</li>
          <li>108 MP Triple Camera</li>
          <li>5000 mAh Battery</li>
          <li>5G Ready, 256 GB Storage</li>
        </ul>

    <figure class="card">
      <img src="asssts/shopping-2.jpeg" alt="SoundMax Wireless Pro">
      <figcaption>
        <p class="title">SoundMax Wireless Pro</p>
        <p class="price">Rs. 4,299</p>

          <li>Active Noise Cancellation</li>
          <li>30 Hours Battery Life</li>
          <li>Bluetooth 5.3</li>
          <li>Foldable Design</li>
        </ul>

    <figure class="card">
      <img src="asssts/shopping-3.jpeg" alt="TimePulse Smartwatch">
      <figcaption>
        <p class="title">TimePulse Smartwatch</p>
        <p class="price">Rs. 7,999</p>
        <ul>
          <li>Heart Rate and SpO2 Monitor</li>
          <li>GPS Tracking</li>
          <li>7 Day Battery Backup</li>
          <li>Water Resistant IP68</li>
        </ul>
      </figcaption>
    </figure>

  </main>

  <footer>
    <p>&copy; 2025 GadgetMart. All rights reserved.</p>
